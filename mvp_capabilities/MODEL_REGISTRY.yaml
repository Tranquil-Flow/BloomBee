# MODEL_REGISTRY.yaml
# ----------------------------------------------------------------------
# Static footprint catalog for the BloomBee distributed-inference MVP.
# Used by the routing layer to answer: "given a peer's free memory,
# which models in the registry can it actually load?"
#
# Field reference:
#   model_id               HuggingFace repo (org/name).
#   params_b               Total parameter count, in billions (full model,
#                          not just active). Used to compute min memory.
#   active_params_b        Params that fire on a single token. Equals
#                          params_b for dense models. For MoE this is
#                          the *real* cost per token (e.g. Qwen3-30B-A3B
#                          loads 30B but only computes ~3.3B per step).
#   hidden_size            Embedding / residual dim.
#   num_layers             Transformer blocks.
#   num_heads              Attention query heads.
#   num_kv_heads           Key/value heads. = num_heads for MHA, < num_heads
#                          for GQA (Llama-3, Qwen2.5+, Qwen3 all use GQA).
#   head_dim               Per-head projection size (usually hidden/heads).
#   context_length         Max positions the model was trained for.
#   dtype_bytes            Bytes per param at the chosen runtime dtype:
#                            2   fp16 or bf16 (typical inference default)
#                            1   int8 quantised
#                            0.5 int4 quantised
#   min_total_mem_gb       params_b * dtype_bytes + 2 GB overhead for KV
#                          cache scratch + activations. A conservative
#                          lower bound — actual resident memory is
#                          usually 1.1–1.4x this once the framework's
#                          allocator pads and CUDA/MPS graphs settle.
#   recommended_min_free_mem_gb
#                          free_gb the peer should have before we route
#                          this model to it. Set ~30% above min_total_mem_gb
#                          for dense, ~10% for MoE (loading still costs
#                          the full params even if compute is sparse).
#   supports_gqa           True if num_kv_heads < num_heads.
#   supports_moe           True if the model has expert routing.
#   hf_config_url           Direct link to the model's config.json on HF.
# ----------------------------------------------------------------------

